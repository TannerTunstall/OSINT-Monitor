  # email:
  #   enabled: true
  #   smtp_host: "smtp.gmail.com"
  #   smtp_port: 587
  #   use_tls: true
  #   username: ${SMTP_USERNAME}
  #   password: ${SMTP_PASSWORD}
  #   from_address: "alerts@example.com"
  #   to_addresses:
  #     - "analyst@example.com"

  # webhook:
  #   enabled: true
  #   urls:
  #     - url: "https://your-endpoint.com/webhook"
  #       method: "POST"
  #       headers:
  #         Authorization: "Bearer ${WEBHOOK_TOKEN}"

# ── FILTERS (optional) ──────────────────────────────────────
# If include_keywords is set, only matching messages are forwarded.
# exclude_keywords always takes precedence.

filters:
  include_keywords: []
    # - "outage"
    # - "incident"
  exclude_keywords: []
    # - "scheduled maintenance"

# ── POLLING INTERVALS ────────────────────────────────────────

polling:
  twitter_interval_seconds: 300     # 5 min
  rss_feeds_interval_seconds: 120   # 2 min

# ── TRANSLATION (optional) ──────────────────────────────────
# Auto-translates non-target-language messages via LibreTranslate.
# translation:
#   enabled: true
#   api_url: "http://translate:5000"
#   target_language: "en"

# ── STORAGE ──────────────────────────────────────────────────

database:
  path: "data/messages.db"
  retention_days: 90

logging:
  level: "INFO"
